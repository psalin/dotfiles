[theme]
theme = "semi-native"

[icons]
icons = "awesome4"

[[block]]
block = "net"
interval = 5
format = " $icon $signal_strength ^icon_net_down $speed_down.eng(prefix:K) ^icon_net_up $speed_up.eng(prefix:K) "

[[block]]
block = "cpu"
interval = 5
format_alt = " $icon $barchart"

[[block]]
block = "disk_space"
interval = 60
info_type = "available"
format = "$icon $available"
format_alt = "$icon $used"

[[block]]
block = "memory"
interval = 10
format = " $icon $mem_used_percents"
format_alt = " $icon_swap {$swap_used_percents|0}"

[[block]]
block = "battery"
interval = 60
format = " $icon  $percentage $time"

[[block]]
block = "rofication"
interval = 5
socket_path = "/tmp/rofi_notification_daemon"

[[block]]
block = "sound"
driver = "pulseaudio"
device_kind = "source"

[[block]]
block = "sound"
driver = "pulseaudio"

[[block]]
block = "time"
interval = 5
[block.format]
full = " $icon $timestamp.datetime(f:'%a %Y-%m-%d %T', l:fi_FI) "
short = " $icon $timestamp.datetime(f:%R) "
